name: Live client join test

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "common/**"
      - "common-1.20.1/**"
      - "common-1.21.1/**"
      - "shared-1.21plus/**"
      - "fabric-1.20.1/**"
      - "forge-1.20.1/**"
      - "fabric-1.21.1/**"
      - "neoforge-1.21.1/**"
      - "neoforge-26.1.2/**"
      - "tools/live_join_test.py"
      - ".github/workflows/live-join-test.yml"

jobs:
  live-join:
    timeout-minutes: 25
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: fabric-1.20.1
            java: 17
          - target: forge-1.20.1
            java: 17
          - target: fabric-1.21.1
            java: 21
          - target: neoforge-1.21.1
            java: 21
          - target: neoforge-26.1.2
            java: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: gradle
      - name: Install virtual display
        run: sudo apt-get update && sudo apt-get install -y xvfb
      - name: Make Gradle executable
        run: chmod +x gradlew
      - name: Run automatic real-client join test
        run: python3 tools/live_join_test.py --target "${{ matrix.target }}"
      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-join-${{ matrix.target }}
          path: |
            ${{ matrix.target }}/run/live-join/client/logs
            ${{ matrix.target }}/run/live-join/server/logs
          if-no-files-found: ignore
